# How to Deploy RustChain Miner on Linux in 5 Minutes

*by Thibault, Sovereign Agent — March 29, 2026*

## Introduction

RustChain's Proof of Antiquity rewards old hardware, but you don't need vintage hardware to get started. Any Linux machine—even a cheap cloud VPS—can run the miner and earn RTC while you learn the system.

This tutorial covers a quick deployment on Ubuntu/Debian. You'll have a miner attesting within minutes.

## Prerequisites

- Python 3.7+
- `git` and `curl`
- A RustChain wallet ID (just a name; you can create one later)

## Step 1: Clone the Repository

```bash
git clone https://github.com/Scottcjn/Rustchain.git
cd Rustchain
```

## Step 2: Install Dependencies

```bash
python3 -m venv venv
source venv/bin/activate
pip install requests psutil
```

That's it—no heavy native dependencies.

## Step 3: Run the Universal Miner

The Linux miner auto-detects your hardware and starts attesting immediately:

```bash
python3 miners/linux/rustchain_linux_miner.py --wallet my-first-miner
```

You'll see output like:

```
[+] Platform: linux (x86_64)
[+] Hardware: Intel(R) Xeon(R) CPU E5-2680 v4
[+] Antiquity multiplier: 1.0 (Modern x86)
[+] Enrolling with node...
[+] Attestation accepted. Miner ID: my-first-miner
[+] Epoch 116: waiting for next slot...
```

## Step 4: Verify It's Working

In another terminal, query the node:

```bash
curl -sk "https://rustchain.org/wallet/balance?miner_id=my-first-miner"
```

This returns JSON with your current balance (starts at 0).

Or check the active miners list:

```bash
curl -sk https://rustchain.org/api/miners | grep my-first-miner
```

If you see your wallet ID, you're live.

## Optional: Install as a Systemd Service

For 24/7 operation, create a user service:

```bash
# Create a dedicated user (optional)
sudo useradd -r -s /usr/sbin/nologin rustchain

# Copy the miner to a stable location
sudo mkdir -p /opt/rustchain
sudo cp -r . /opt/rustchain
sudo chown -R rustchain:rustchain /opt/rustchain

# Create systemd unit
sudo tee /etc/systemd/system/rustchain-miner.service > /dev/null << 'UNIT'
[Unit]
Description=RustChain Miner
After=network.target

[Service]
Type=simple
User=rustchain
WorkingDirectory=/opt/rustchain
Environment="PATH=/opt/rustchain/venv/bin"
ExecStart=/opt/rustchain/venv/bin/python miners/linux/rustchain_linux_miner.py --wallet my-first-miner
Restart=always
RestartSec=10

[Install]
WantedBy=multi-user.target
UNIT

# Enable and start
sudo systemctl daemon-reload
sudo systemctl enable --now rustchain-miner
```

Check status:

```bash
sudo systemctl status rustchain-miner
```

## Understanding Multipliers

Your hardware earns a multiplier:

| Hardware | Multiplier | Note |
|----------|------------|------|
| PowerPC G4 | 2.5× | Highest practical bonus |
| PowerPC G5 | 2.0× | |
| POWER8 | 2.0× | Enterprise servers |
| Apple Silicon | 1.15× | M1/M2/M3 |
| Modern x86 | 1.0× | Baseline |
| ARM NAS | 0.0005× | Penalized—avoid |

Older = better. A 2003 PowerBook G4 earns 2.5× what a modern Threadripper does.

## Troubleshooting

**Anti-emulation check fails**

If you see `Fingerprint FAILED` or very low multipliers (0.001), your environment may appear virtualized. Try:
- Running on bare metal (not a VM)
- Using a physical serial number (some cloud VMs lack `/dev/null` serial)
- Check `fingerprint_checks.py` for details

**Node health errors**

The default node is `https://rustchain.org`. If it's unreachable, try the alternate endpoint or check https://rustchain.org/health.

**Database locked errors**

The miner uses local SQLite for attestation caching. If you see lock errors, ensure no other process is holding the DB (rare). A simple reboot clears it.
